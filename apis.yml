aid: textgears
name: TextGears
description: >-
  TextGears is a grammar checking and text analysis REST API providing spelling
  corrections, grammar error detection, readability scoring, language detection,
  and text summarization across 11 languages. The service processes over 10.8
  million API requests daily and offers distributed infrastructure across
  Estonia, Singapore, and the United States for low-latency access.
