    name: TextGears API
    description: >-
      REST API for grammar checking, spelling correction, readability analysis,
      text summarization, language detection, and custom dictionary management.
      Supports 11 languages and multiple English dialects. Authentication via
      API key passed as a query parameter, POST body, or Authorization header.
